name: fcd
description: Aplicación móvil-first para clases de Círculo Dorado con scaffolding de escritorio.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  video_player: ^2.9.2
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
